            "r1-r5-10", "r1-r5-12", "r1-r5-14", "r1-r5-16", "r1-r5-18", "r1-r5-20",
            "r1-r6-10", "r1-r6-12", "r1-r6-14", "r1-r6-16", "r1-r6-18", "r1-r6-20",
            "r1-r7-10", "r1-r7-12", "r1-r7-14", "r1-r7-16", "r1-r7-18",
            "r1-r8-10", "r1-r8-12", "r1-r8-14", "r1-r8-16", "r1-r8-18", "r1-r8-20",
            "r1-r9-2", "r1-r9-4", "r1-r9-6", "r1-r9-8", "r1-r9-10", "r1-r9-12", "r1-r9-14", "r1-r9-16", "r1-r9-18", "r1-r9-20",
            "r1-r10-2", "r1-r10-4", "r1-r10-6", "r1-r10-8", "r1-r10-10", "r1-r10-12", "r1-r10-14", "r1-r10-16", "r1-r10-18", "r1-r10-20",
          ],
          "price_1200": [ 
            "r1-l11-1", "r1-l11-3", "r1-l11-5",
            "r1-l12-1", "r1-l12-3", "r1-l12-5", "r1-l12-7", "r1-l12-9", "r1-l12-11",
            "r1-l13-1", "r1-l13-3", "r1-l13-5", "r1-l13-7", "r1-l13-9", "r1-l13-11",
            "r1-l14-1", "r1-l14-3", "r1-l14-5", "r1-l14-7", "r1-l14-9",
            "r1-l15-1", "r1-l15-3", "r1-l15-5", "r1-l15-7", "r1-l15-9", "r1-l15-11", "r1-l15-13", "r1-l15-15", "r1-l15-17", "r1-l15-19", "r1-l15-21", "r1-l15-23",
            "r1-r11-2", "r1-r11-4", "r1-r11-6", "r1-r11-8", "r1-r11-10", "r1-r11-12", "r1-r11-14", "r1-r11-16", "r1-r11-18",
            "r1-r12-2", "r1-r12-4", "r1-r12-6", "r1-r12-8", "r1-r12-10", "r1-r12-12", "r1-r12-14", "r1-r12-16", "r1-r12-18", "r1-r12-20",
            "r1-r13-2", "r1-r13-4", "r1-r13-6", "r1-r13-8", "r1-r13-10", "r1-r13-12", "r1-r13-14", "r1-r13-16", "r1-r13-18",
            "r1-r14-2", "r1-r14-4", "r1-r14-6", "r1-r14-8", "r1-r14-10", "r1-r14-12", "r1-r14-14", "r1-r14-16", "r1-r14-18", "r1-r14-20",
            "r1-r15-2", "r1-r15-4", "r1-r15-6", "r1-r15-8", "r1-r15-10", "r1-r15-12", "r1-r15-14", "r1-r15-16",
          ]
      };
  
      const defaultType = "general"; 
      const soldSeatsList = ["r1-l5-1", "r1-l5-3","r1-l5-5"];
  
      let seatConfig = {};
      const cart = new Map();
      let zoneCounts = {}; 
  
      function parseSeatId(seatId) {
          const parts = seatId.split('-');
          if (parts.length < 3) return seatId; 
          const floorMap = { 
              "r1": " ",
              // "r1e": "二樓E區", "r1d": "二樓D區", "r1c": "二樓C區", "r1b": "二樓B區",
              // "l1e": "二樓E區", "l1d": "二樓D區", "l1c": "二樓C區", "l1b": "二樓B區",
              // "r2e": "三樓E區", "r2d": "三樓D區", "r2c": "三樓C區", "r2b": "三樓B區",
              // "l2e": "三樓E區", "l2d": "三樓D區", "l2c": "三樓C區", "l2b": "三樓B區",
              // "r3e": "四樓E區", "r3d": "四樓D區", "r3c": "四樓C區", "r3b": "四樓B區",
              // "l3e": "四樓E區", "l3d": "四樓D區", "l3c": "四樓C區", "l3b": "四樓B區"
          };
          const floorStr = floorMap[parts[0]] || parts[0]; 
          let rawRow = parts[1];
          let rowContent = rawRow.replace(/^[lrm]/i, '').toUpperCase();
          const rowStr = rowContent + "排"; 
          const numStr = parts[2] + "號"; 
          return `${floorStr} ${rowStr} ${numStr}`;
      }

      // 定義全域變數
      let panZoomInstance;
      let isDragging = false; // 用來判斷是否正在拖曳

      function initSeatMap() {
          renderLegend();
          generateConfig();

          const groups = document.querySelectorAll('svg g[id^="r"]');
          
          // --- 1. 綁定事件前，先處理拖曳與點擊的衝突 ---
          const svgElement = document.getElementById('seats-photo');
          
          // 當滑鼠/手指按下時，重置拖曳狀態
          svgElement.addEventListener('mousedown', () => { isDragging = false; });
          svgElement.addEventListener('touchstart', () => { isDragging = false; });

          // 當滑鼠/手指移動時，標記為「正在拖曳」
          svgElement.addEventListener('mousemove', () => { isDragging = true; });
          svgElement.addEventListener('touchmove', () => { isDragging = true; });

          groups.forEach(group => {
              const id = group.getAttribute('id');
              const config = seatConfig[id];
              if(!config) return;

              const rect = group.querySelector('rect');
              if (config.status === 'sold') {
                  group.classList.add('sold-seat');
              } else if (rect) {
                  if(config.color) rect.style.fill = config.color;
                  else rect.style.fill = "#ffffff"; 

                  if (config.stroke) {
                      rect.style.stroke = config.stroke;
                      rect.style.strokeWidth = "1px";
                  }
                  if (!config.isSelectable) {
                      group.style.cursor = "default";
                  }
              }

              // --- 2. 修改點擊監聽器 ---
              // 改用 onclick，並在裡面判斷 isDragging
              group.addEventListener('click', function(e) {
                  e.stopPropagation(); // 阻止事件冒泡
                  e.preventDefault();  // 阻止預設行為

                  // 如果剛剛有拖曳動作，就不執行選位
                  if (isDragging) {
                      isDragging = false; // 重置狀態
                      return; 
                  }

                  toggleSeat(id, this);
              });
              // 為了相容手機觸控，有時 click 反應較慢，可用 touchend 輔助，
              // 但 svg-pan-zoom 通常會處理掉 touch 事件，保留 click 最單純。
          });

          updateSidebar();

          // --- 3. 啟用 svg-pan-zoom ---
          // 確保 DOM 載入且計算完畢後執行
          setTimeout(() => {
            // 1. 初始化套件
            panZoomInstance = svgPanZoom('#seats-photo', {
                zoomEnabled: true,
                controlIconsEnabled: false, // 關閉預設按鈕，使用自訂按鈕
                fit: true,
                center: true,
                minZoom: 1,
                maxZoom: 5,
                dblClickZoomEnabled: false,
                preventMouseEventsDefault: false // 允許事件穿透，確保選位正常
            });

            // 綁定放大按鈕
            const zoomInBtn = document.getElementById('zoom-in-btn');
            if(zoomInBtn) {
                zoomInBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    panZoomInstance.zoomIn();
                });
            }

            // 綁定縮小按鈕
            const zoomOutBtn = document.getElementById('zoom-out-btn');
            if(zoomOutBtn) {
                zoomOutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    panZoomInstance.zoomOut();
                });
            }

            // 綁定重置按鈕
            const resetBtn = document.getElementById('reset-btn');
            if(resetBtn) {
                resetBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    panZoomInstance.resetZoom();
                    panZoomInstance.center(); 
                });
            }
          }, 100);
          
          // 視窗大小改變時，重置 SVG 大小
          window.addEventListener('resize', function(){
              if(panZoomInstance) panZoomInstance.resize();
          });
      }
      function generateConfig() {
          for(let key in ticketTypes) zoneCounts[key] = 0;
          
          // 這裡維持選取所有 r 開頭的群組
          const allGroups = document.querySelectorAll('svg g[id^="r"]');

          allGroups.forEach(group => {
              const id = group.getAttribute('id');

              // ★★★ 關鍵修改在這裡 ★★★
              
              // 1. 先排除 line_1F
              if (id === 'line_1F') return;

              // 2. 排除「容器群組」
              // 座位ID通常是 "r1-r15-2" (用'-'切開會有3段)
              // 容器ID通常是 "r1-r15" (用'-'切開只有2段)
              // 透過判斷段數，只保留真正的座位
              if (id.split('-').length < 3) return; 

              // --- 以下邏輯保持不變 ---
              let assignedType = defaultType;
              for (const [type, idList] of Object.entries(seatTypeAssignments)) {
                  if (idList.includes(id)) {
                      assignedType = type;
                      break;
                  }
              }
              if(zoneCounts[assignedType] !== undefined) zoneCounts[assignedType]++;
              const typeData = ticketTypes[assignedType];
              seatConfig[id] = {
                  type: assignedType,
                  color: typeData.color,
                  stroke: typeData.stroke,
                  isSelectable: typeData.isSelectable,
                  status: "available"
              };
          });
          
          soldSeatsList.forEach(id => {
              if (seatConfig[id]) seatConfig[id].status = "sold";
          });
      }
  
      function toggleSeat(id, element) {
          const config = seatConfig[id];
          if (!config.isSelectable) return;
          if (config.status === 'sold') { alert("此座位已售完！"); return; }
          if (cart.has(id)) {
              cart.delete(id);
              element.classList.remove('selected');
          } else {
              const zoneData = ticketTypes[config.type];
              const defaultOptionId = zoneData.options[0].id;
              cart.set(id, defaultOptionId); 
              element.classList.add('selected');
          }
          updateSidebar();
      }
  
      // ★★★ 更新後的 updateSidebar：整合了統計與購物車列表 ★★★
      function updateSidebar() {
          const sidebar = document.getElementById('sidebar');
          const contentContainer = document.getElementById('sidebar-content');
          const totalPriceEl = document.getElementById('total-price');
          const checkoutBtn = document.getElementById('btn-checkout');
  
          if (cart.size > 0) sidebar.classList.add('active');
  
          // 清空內容
          contentContainer.innerHTML = "";
  
          let totalPrice = 0;
          let hasItems = false;
  
          // 遍歷所有票種 (Zone)
          for (const [typeKey, typeData] of Object.entries(ticketTypes)) {
              // 計算該區統計
              const totalCap = zoneCounts[typeKey] || 0;
              if (totalCap === 0) continue; // 如果SVG中沒有這個區的座位，則跳過
  
              let soldCount = 0;
              for (const sid in seatConfig) {
                  if (seatConfig[sid].type === typeKey && seatConfig[sid].status === 'sold') soldCount++;
              }
              
              // 找出購物車中屬於此區的座位
              const selectedSeatsInZone = [];
              cart.forEach((ticketId, seatId) => {
                  if (seatConfig[seatId].type === typeKey) {
                      selectedSeatsInZone.push({ seatId, ticketId });
                  }
              });
  
              // const remaining = totalCap - soldCount - selectedSeatsInZone.length;
              const remaining = totalCap - soldCount;
              if (selectedSeatsInZone.length > 0) hasItems = true;
  
              // --- 建立 UI：區域容器 ---
              const zoneGroup = document.createElement('div');
              zoneGroup.className = 'zone-group';
  
              // 1. 區域標題 (Stat Row)
              let legendStyle = "";
              if(typeData.color) legendStyle += `background:${typeData.color};`;
              if(typeData.stroke) legendStyle += `border:2px solid ${typeData.stroke};`;
              else if(!typeData.color) legendStyle += `background:#fff; border:1px solid #ccc;`;
  
              const headerHtml = `
                  <div class="zone-header">
                      <div style="display:flex; align-items:center;">
                          <span style="display:inline-block; width:12px; height:12px; margin-right:8px; border-radius:2px; ${legendStyle}"></span>
                          <span>${typeData.name}</span>
                      </div>
                      <span class="stat-count">剩餘座位：${remaining} </span>
                  </div>
              `;
              zoneGroup.innerHTML = headerHtml;
  
              // 2. 項目列表容器
              const itemsContainer = document.createElement('div');
              itemsContainer.className = 'zone-items';
  
              // 3. 填入已選座位
              if (selectedSeatsInZone.length > 0) {
                  selectedSeatsInZone.forEach(item => {
                      const seatId = item.seatId;
                      const ticketId = item.ticketId;
                      const seatFullName = parseSeatId(seatId);
                      
                      const currentOption = typeData.options.find(opt => opt.id === ticketId);
                      const currentPrice = currentOption ? currentOption.price : 0;
                      totalPrice += currentPrice;
  
                      // 票價選單 HTML
                      const hasMultipleOptions = typeData.options && typeData.options.length > 1;
                      let optionsHtml = "";
                      if(hasMultipleOptions) {
                          typeData.options.forEach(opt => {
                              const selected = opt.id === ticketId ? "selected" : "";
                              optionsHtml += `<option value="${opt.id}" ${selected}>${opt.name}: $${opt.price}</option>`;
                          });
                      } else {
                          optionsHtml = `<span style="font-size:0.9em; color:#666; display:block; margin-top:5px;">${typeData.options[0].name}: $${typeData.options[0].price}</span>`;
                      }
  
                      const itemDiv = document.createElement('div');
                      itemDiv.className = 'cart-item';
                      // 在 cart-item 左側顯示顏色條，對應區域顏色
                      const itemBorderStyle = typeData.color ? `border-left-color: ${typeData.color};` : `border-left-color: #ccc;`;
                      itemDiv.style.cssText = itemBorderStyle;
  
                      itemDiv.innerHTML = `
                          <div class="cart-item-header">
                              <span>${seatFullName}</span>
                              <span class="cart-item-remove" onclick="removeSeat('${seatId}')">✕ 移除</span>
                          </div>
                          ${hasMultipleOptions ? `<select class="ticket-select" onchange="changeTicketType('${seatId}', this.value)">${optionsHtml}</select>` : optionsHtml}
                      `;
                      itemsContainer.appendChild(itemDiv);
                  });
              } else {
                  // 如果該區沒有選位，可以選擇隱藏 itemsContainer 或顯示 "未選擇"
                  // 這裡保持空白，只顯示 Header 統計
              }
  
              zoneGroup.appendChild(itemsContainer);
              contentContainer.appendChild(zoneGroup);
          }
  
          // 更新總金額與按鈕狀態
          totalPriceEl.textContent = "NT$ " + totalPrice.toLocaleString();
          checkoutBtn.disabled = !hasItems;
      }
  
      function renderLegend() {
          const container = document.getElementById('map-legend');
          let html = "";
          for(const [key, data] of Object.entries(ticketTypes)) {
              let style = "";
              if(data.color) style += `background:${data.color};`;
              if(data.stroke) style += `border:2px solid ${data.stroke};`;
              else if(!data.color) style += `background:#fff; border:1px solid #ccc;`; 
              const label = data.capacityStr ? `${data.name} ${data.capacityStr}` : data.name;
              html += `<div class="legend-item"><span class="legend-color" style="${style}"></span>${label}</div>`;
          }
          html += `<div class="legend-item"><span class="legend-color" style="background:#dcdcdc"></span>已售完</div>`;
          html += `<div class="legend-item"><span class="legend-color" style="border:2px solid red; background:#fffad9"></span>已選擇</div>`;
          container.innerHTML = html;
      }
  
      function changeTicketType(seatId, newType) { if (cart.has(seatId)) { cart.set(seatId, newType); updateSidebar(); } }
      function removeSeat(seatId) { const element = document.getElementById(seatId); if (element) toggleSeat(seatId, element); }
      function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
  
      window.addEventListener('DOMContentLoaded', initSeatMap);
  </script>

</body>
<script>
	$(document).ready(function () {
		
		new WOW().init();

		// $(".imgLiquidFill").imgLiquid({fill:true});

		$('#header').load('page/header.html');
		$('#footer').load('page/footer.html');

		$(window).on("scroll", function() {
			if ($(window).scrollTop() > 100) {
				$("#header").addClass("fixed");
				// $(".logo").fadeIn(200);
			} else {
				$("#header").removeClass("fixed");
				// $(".logo").fadeOut(0);
			}
		});
		
		document.querySelectorAll('.quantity-selector').forEach(selector => {
            const minusBtn = selector.querySelector('.minus');
            const plusBtn = selector.querySelector('.plus');
            const quantitySpan = selector.querySelector('.quantity');

            minusBtn.addEventListener('click', () => {
                let quantity = parseInt(quantitySpan.textContent);
                if (quantity > 0) {
                    quantity--;
                    quantitySpan.textContent = quantity;
                }
            });

            plusBtn.addEventListener('click', () => {
                let quantity = parseInt(quantitySpan.textContent);
                // You can add a max limit if needed, e.g., if (quantity < 10)
                quantity++;
                quantitySpan.textContent = quantity;
            });
        });

        document.querySelectorAll('.price-zones button').forEach(button => {
            button.addEventListener('click', () => {
                // Remove active class from all buttons
                document.querySelectorAll('.price-zones button').forEach(btn => btn.classList.remove('active'));
                // Add active class to the clicked button
                button.classList.add('active');
            });
        });

        // popup
        const popup = $('#seatingChartPopup');
        const openBtn = $('#openSeatingChartBtn');
        const closeBtn = $('.close-btn');

        openBtn.on('click', function() {
            popup.css('display', 'flex');
        });

        closeBtn.on('click', function() {
            popup.hide();
        });

        $(window).on('click', function(event) {
            if ($(event.target).is(popup)) {
                popup.hide();
            }
        });
	})
	
	//tab 切換
	window.addEventListener('DOMContentLoaded', () => {
		const hash = window.location.hash;
		if (hash) {
		const targetTab = document.querySelector(`input[type="radio"]${hash}`);
		if (targetTab) {
			targetTab.checked = true;
		}
		}
	});


</script>
